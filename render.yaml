services:
  - type: web
    name: mcp-web-search
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:starlette_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MCP_BILLING_API
        value: https://mcp-billing-api.onrender.com
      - key: MCP_LICENSE_KEY
        sync: false
